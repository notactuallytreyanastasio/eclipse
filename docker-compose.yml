services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "${PORT:-4000}:4000"
    environment:
      DB_HOSTNAME: db
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_DATABASE: illuminates_dev
      PHX_HOST: localhost
      PORT: "4000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    develop:
      watch:
        - action: sync
          path: ./lib
          target: /app/lib
        - action: sync
          path: ./assets
          target: /app/assets
        - action: sync
          path: ./priv
          target: /app/priv
        - action: sync
          path: ./config
          target: /app/config
        - action: sync
          path: ./test
          target: /app/test

  graph:
    build:
      context: .
      dockerfile: Dockerfile.graph
    volumes:
      - ./.deciduous:/data/.deciduous
    working_dir: /data
    ports:
      - "${GRAPH_PORT:-3000}:3000"
    restart: unless-stopped

volumes:
  pgdata:
