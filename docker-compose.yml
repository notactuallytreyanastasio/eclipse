services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "${PORT:-4000}:4000"
    environment:
      DATABASE_URL: ecto://postgres:postgres@db/illuminates_dev
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:-J3Ghx7LcXm9y4kR1vTn2bQ8pWs5dFe0iAoUz6jMhNgKt3rYqVxCf4wDlPmSaEb}
      PHX_HOST: ${PHX_HOST:-localhost}
      PORT: "4000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
